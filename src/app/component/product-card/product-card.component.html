<div class="card h-100 shadow-sm border-0 rounded-4">
    <div class="p-3">
        <img [src]="product().imageUrl" class="img-fluid rounded-3 w-100" style="height: 240px; object-fit: cover;" />
    </div>

    <div class="card-body pt-0 d-flex flex-column">
        <h3 class="h6 fw-semibold mb-2">{{ product().name }}</h3>
        <p class="text-muted small mb-3">
            {{ product().description }}
        </p>
        <div class="mt-2"> Rating {{product().rating}}</div>
        <div class="text-sm font=medium text-gray-500"> {{product().inStock ? 'In Stock' : 'Out of Stock'}}</div>
        <div class="d-flex justify-content-between align-items-center">
            <span class="h5 fw-bold text-primary mb-0">${{ product().price }}</span>
            <button class="btn btn-sm btn-primary rounded-3" [disabled]="!product().inStock"></button>
                <!-- (click)="addToCartClicked.emit(product())"> -->
                Add to Cart
            <!-- </button> -->
        </div>

    </div>
</div>
